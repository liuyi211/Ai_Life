version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: life-echo-postgres
    environment:
      POSTGRES_USER: life_echo
      POSTGRES_PASSWORD: life_echo_dev
      POSTGRES_DB: life_echo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U life_echo"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: life-echo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
