<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>人生回响 | 人生模拟</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #eee9df;
      --ink: #221d18;
      --ink-soft: #5a5047;
      --muted: #948879;
      --line: rgba(34, 29, 24, 0.13);
      --line-strong: rgba(34, 29, 24, 0.28);
      --crimson: #7a2020;
      --gold: #9f7c3e;
      --green: #3e6a4b;
      --ivory: #f8f4ec;
      --font-serif: 'Cormorant Garamond', 'Noto Serif SC', serif;
      --font-cn: 'Noto Serif SC', serif;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-serif);
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% -12%, rgba(122,32,32,0.13), transparent 34%),
        radial-gradient(circle at 8% 78%, rgba(159,124,62,0.18), transparent 31%),
        radial-gradient(circle at 92% 80%, rgba(34,29,24,0.08), transparent 30%),
        linear-gradient(180deg, #f4efe6 0%, #ebe3d5 46%, #ddd1bf 100%);
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.17;
      background-image:
        linear-gradient(90deg, rgba(34,29,24,0.12) 1px, transparent 1px),
        linear-gradient(0deg, rgba(34,29,24,0.09) 1px, transparent 1px),
        repeating-radial-gradient(circle at 20% 20%, rgba(34,29,24,0.13) 0 1px, transparent 1px 4px);
      background-size: 74px 74px, 74px 74px, 18px 18px;
      mix-blend-mode: multiply;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100vh;
      padding: 12px 18px 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sigil {
      position: absolute;
      top: 68px;
      left: 50%;
      width: 336px;
      height: 336px;
      transform: translateX(-50%);
      border: 1px solid rgba(34,29,24,0.08);
      border-radius: 50%;
      pointer-events: none;
      z-index: -1;
      animation: breathe 5.8s ease-in-out infinite;
    }

    .sigil::before,
    .sigil::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(34,29,24,0.07);
    }

    .sigil::before { inset: 32px; }
    .sigil::after { inset: 72px; border-color: rgba(122,32,32,0.12); }

    .sigil-line,
    .sigil-line::before,
    .sigil-line::after {
      content: "";
      position: absolute;
      left: 50%; top: 0;
      width: 1px; height: 100%;
      background: rgba(34,29,24,0.045);
      transform-origin: center;
    }
    .sigil-line::before { transform: rotate(60deg); }
    .sigil-line::after { transform: rotate(-60deg); }

    @keyframes breathe {
      0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.82; }
      50% { transform: translateX(-50%) scale(1.035); opacity: 1; }
    }

    .topbar {
      display: grid;
      grid-template-columns: 26px 1fr 26px;
      align-items: center;
      gap: 10px;
      margin-bottom: 7px;
      order: 1;
    }

    .icon-btn {
      width: 26px;
      height: 26px;
      border: 1px solid rgba(34,29,24,0.18);
      background: rgba(248,244,236,0.22);
      color: var(--ink);
      font-family: var(--font-serif);
      font-size: 13px;
      cursor: pointer;
      transition: .24s ease;
    }

    .icon-btn:active { transform: translateY(2px); border-color: var(--crimson); color: var(--crimson); }

    .top-identity {
      min-width: 0;
      text-align: center;
    }

    .top-name {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 9px;
      line-height: 1;
      margin-bottom: 4px;
    }

    .top-name b {
      font-size: 20px;
      font-weight: 400;
      letter-spacing: 4px;
    }

    .top-name span {
      color: var(--crimson);
      font-size: 16px;
      font-weight: 300;
      letter-spacing: 1px;
    }

    .top-meta {
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 1.4px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .stat-strip {
      order: 2;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      margin-bottom: 7px;
      background: rgba(248,244,236,0.14);
    }

    .auto-save-note {
      display: none;
    }

    .profile-card {
      display: none;
    }

    .profile-card::before,
    .profile-card::after {
      display: none;
    }

    .profile-head {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .person h2 {
      margin: 0 0 4px;
      font-size: 22px;
      line-height: 1;
      font-weight: 400;
      letter-spacing: 4px;
    }

    .person p {
      margin: 0;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 1px;
      line-height: 1.35;
    }

    .age-seal {
      text-align: right;
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    .age-seal strong {
      display: block;
      color: var(--crimson);
      font-size: 20px;
      font-weight: 300;
      line-height: 1;
      margin-bottom: 3px;
    }

    .attrs {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }

    .attr {
      position: relative;
      text-align: center;
      padding: 5px 0 5px;
      border-right: 1px solid var(--line);
    }

    .attr:last-child { border-right: none; }
    .attr b { display: block; font-size: 16px; line-height: 1; font-weight: 300; color: var(--ink); }
    .attr span { display: block; margin-top: 4px; color: var(--muted); font-size: 8px; letter-spacing: 1.2px; }
    .attr em {
      position: absolute;
      top: -10px;
      right: 7px;
      color: var(--green);
      font-style: normal;
      font-size: 12px;
      opacity: 0;
      transform: translateY(6px);
      transition: .35s ease;
    }
    .attr.bump em { opacity: 1; transform: translateY(0); }

    .story-panel {
      order: 3;
      position: relative;
      flex: 1 1 auto;
      min-height: 0;
      border: 1px solid var(--line-strong);
      background:
        linear-gradient(180deg, rgba(248,244,236,0.58), rgba(238,233,223,0.34)),
        radial-gradient(circle at 50% 8%, rgba(159,124,62,0.11), transparent 34%);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 12px 42px rgba(34,29,24,0.08);
    }

    .story-panel::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(34,29,24,0.08);
      pointer-events: none;
      z-index: 0;
    }

    .story-head {
      position: relative;
      z-index: 1;
      padding: 11px 13px 9px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .state {
      color: var(--crimson);
      font-size: 12px;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .state::before {
      content: "";
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--crimson);
      box-shadow: 0 0 0 7px rgba(122,32,32,0.07);
    }

    .node-code { color: var(--muted); font-size: 11px; letter-spacing: 1.5px; }

    .story-scroll {
      position: relative;
      z-index: 1;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 18px 16px 12px;
      scrollbar-width: none;
      scroll-behavior: smooth;
    }
    .story-scroll::-webkit-scrollbar { display: none; }

    .entry {
      position: relative;
      margin-bottom: 18px;
      padding-left: 14px;
      border-left: 1px solid rgba(122,32,32,0.28);
      animation: fadeUp .28s ease both;
    }

    .entry.choice-made { border-left-color: rgba(159,124,62,0.58); }
    .entry.system { border-left-color: rgba(34,29,24,0.18); }

    .entry p {
      margin: 0;
      color: var(--ink-soft);
      font-family: var(--font-cn);
      font-size: 15px;
      line-height: 1.9;
      letter-spacing: .8px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .typing::after {
      content: "";
      display: inline-block;
      width: 1px;
      height: 1em;
      margin-left: 3px;
      background: var(--crimson);
      vertical-align: -2px;
      animation: blink 1s steps(1) infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    .choice-box {
      display: none;
      position: relative;
      z-index: 2;
      padding: 10px 12px 12px;
      border-top: 1px solid var(--line);
      background: rgba(238,233,223,0.72);
    }

    .choice-box.show { display: grid; gap: 8px; }

    .choice-title {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 1.5px;
      margin-bottom: 1px;
    }

    .choice {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(248,244,236,0.36);
      color: var(--ink-soft);
      min-height: 42px;
      padding: 9px 10px;
      display: grid;
      grid-template-columns: 22px 1fr auto;
      gap: 8px;
      align-items: center;
      text-align: left;
      font-family: var(--font-cn);
      font-size: 12px;
      line-height: 1.45;
      cursor: pointer;
      transition: .24s ease;
    }

    .choice i { font-style: normal; color: var(--crimson); font-family: var(--font-serif); font-size: 14px; }
    .choice em { font-style: normal; color: var(--muted); font-size: 11px; white-space: nowrap; }
    .choice:active { transform: translateX(3px); border-color: rgba(122,32,32,0.40); background: rgba(122,32,32,0.06); color: var(--ink); }

    .thinking {
      display: none;
      position: relative;
      z-index: 1;
      padding: 0 15px 12px;
      align-items: center;
      gap: 9px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 1.6px;
    }

    .thinking.show { display: flex; }

    .spinner {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1px solid rgba(122,32,32,.22);
      border-top-color: var(--crimson);
      animation: spin .9s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .story-action {
      position: relative;
      z-index: 2;
      padding: 6px 12px 12px;
      border-top: none;
      background: transparent;
    }

    .bottom-actions {
      display: none;
    }

    .btn-ghost {
      display: none;
    }

    .btn-primary {
      width: 100%;
      height: 42px;
      border: none;
      background: transparent;
      color: var(--crimson);
      font-family: var(--font-serif);
      font-size: 15px;
      letter-spacing: 5px;
      cursor: pointer;
      transition: .24s ease;
      animation: pulseText 1.55s ease-in-out infinite;
    }

    .btn-primary:disabled {
      opacity: .42;
      cursor: not-allowed;
      animation: none;
    }

    .btn-primary:not(:disabled):active {
      transform: translateY(2px);
      color: var(--ink);
    }

    @keyframes pulseText {
      0%, 100% { opacity: .38; }
      50% { opacity: 1; }
    }

    .toast {
      position: fixed;
      left: 50%; bottom: 88px;
      transform: translateX(-50%) translateY(14px);
      opacity: 0; z-index: 30; pointer-events: none;
      background: rgba(34,29,24,0.92);
      color: var(--ivory);
      padding: 11px 17px;
      font-size: 13px;
      letter-spacing: 2px;
      transition: .24s ease;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (min-width: 768px) {
      body { display: flex; align-items: center; justify-content: center; background: #d4c8b8; }
      .app { width: 430px; height: 860px; max-height: 96vh; background: var(--bg); box-shadow: 0 30px 100px rgba(34,29,24,0.24); }
      .toast { bottom: calc(50% - 370px); }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="sigil" aria-hidden="true"><span class="sigil-line"></span></div>

    <header class="topbar">
      <button class="icon-btn" onclick="autoExit()">‹</button>
      <div class="top-identity">
        <div class="top-name"><b id="nameText">周砚</b><span id="ageText">17 岁</span></div>
        <div class="top-meta">地球 Online / 男 / 天赋：早慧之眼</div>
      </div>
      <button class="icon-btn" onclick="toast('命运日志已封存')">印</button>
    </header>

    <div class="stat-strip attrs">
      <div class="attr" id="attrBody"><em>+0</em><b>07</b><span>体魄</span></div>
      <div class="attr" id="attrMind"><em>+0</em><b>09</b><span>悟性</span></div>
      <div class="attr" id="attrBond"><em>+0</em><b>06</b><span>羁绊</span></div>
      <div class="attr" id="attrFate"><em>+0</em><b>08</b><span>气运</span></div>
    </div>

    <section class="profile-card"></section>

    <section class="story-panel">
      <div class="story-head">
        <div class="state" id="storyState">命运正在展开</div>
        <div class="node-code" id="nodeCode">FRAGMENT 001</div>
      </div>

      <div class="story-scroll" id="storyScroll"></div>

      <div class="thinking" id="thinking">
        <span class="spinner"></span>
        <span>AI 正在续写命运片段……</span>
      </div>

      <div class="choice-box" id="choiceBox">
        <div class="choice-title"><span>命运分歧</span><span>Choose One</span></div>
        <button class="choice" onclick="choosePath('A')"><i>A</i><span id="choiceA">接受邀请，隐瞒家事。</span><em>+悟性</em></button>
        <button class="choice" onclick="choosePath('B')"><i>B</i><span id="choiceB">回家，处理债务。</span><em>+羁绊</em></button>
        <button class="choice" onclick="choosePath('C')"><i>C</i><span id="choiceC">打开那封邮件。</span><em>+气运</em></button>
      </div>

      <div class="story-action">
        <button class="btn-primary" id="continueBtn" onclick="continueLife()">拨动命线</button>
      </div>
    </section>
  </main>

  <div class="toast" id="toast">命运已回应</div>

  <script>
    const fragments = [
      '暴雨压低了旧城区的屋檐。',
      '你站在巷口，鞋底全湿。',
      '手机忽然亮起一封陌生邮件。',
      '发件人一栏，是十年后的你。',
      '邮件只写着：今晚别回头。',
      '远处传来父亲压低的争吵声。',
      '竞赛老师同时发来确认消息。',
      '你意识到命运正在收紧。',
      '巷口的路灯闪了三次。',
      '一辆黑车停在雨幕尽头。',
      '车窗里有人递出一只信封。',
      '信封上写着你的名字。',
      '你听见心跳声变得很重。',
      '这不是第一次选择，却像第一次审判。',
      '雨声忽然停了一瞬。',
      '你看见水洼里映出另一张脸。',
      '那张脸比你年长，也更疲惫。',
      '他说：别相信最容易的答案。',
      '下一秒，倒影被雨打碎。',
      '你握紧手机，掌心发冷。'
    ];

    const choiceSets = [
      {
        a: '去学校，接受竞赛邀请。',
        b: '回家，问清债务来源。',
        c: '追查未来邮件地址。',
        result: {
          A: ['你选择了竞赛。', '老师递给你一张封存推荐表。', '你的悟性提升了。'],
          B: ['你推开家门。', '父亲沉默很久，说出一个名字。', '你的羁绊加深了。'],
          C: ['你打开邮件源代码。', '服务器显示已报废三年。', '你的气运发生偏移。']
        }
      },
      {
        a: '保留秘密，独自调查。',
        b: '告诉最信任的人。',
        c: '删除邮件，假装无事。',
        result: {
          A: ['你开始独自调查。', '秘密像一枚钉子留在心底。', '你的悟性提升了。'],
          B: ['你把秘密说出口。', '对方没有笑，只问你是否害怕。', '你的羁绊加深了。'],
          C: ['你删除了邮件。', '屏幕熄灭后，雨声变得陌生。', '你的气运发生偏移。']
        }
      },
      {
        a: '接受黑车里的信封。',
        b: '转身冲进雨里。',
        c: '拨通老师的电话。',
        result: {
          A: ['你接过信封。', '里面只有一张医院缴费单。', '你的气运发生偏移。'],
          B: ['你冲进雨幕。', '旧巷尽头有人叫住你。', '你的体魄提升了。'],
          C: ['电话接通了。', '老师说：你终于发现了。', '你的悟性提升了。']
        }
      }
    ];

    const stats = { body: 7, mind: 9, bond: 6, fate: 8 };
    let fragmentIndex = 0;
    let nodeIndex = 1;
    let isTyping = false;
    let choiceMode = false;
    let toastTimer = null;

    window.addEventListener('load', () => {
      appendEntry('你出生在一个普通家庭。命运没有立刻显现，只在十七岁那年，悄悄推了你一把。');
    });

    function autoExit() {
      toast('已自动保存，返回命运主厅');
    }

    function toast(text) {
      const el = document.getElementById('toast');
      el.textContent = text;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 1400);
    }

    function appendEntry(text, className = '') {
      const scroll = document.getElementById('storyScroll');
      const entry = document.createElement('article');
      entry.className = 'entry ' + className;
      entry.innerHTML = `<p></p>`;
      scroll.appendChild(entry);
      typeText(entry.querySelector('p'), text);
    }

    function typeText(target, text) {
      isTyping = true;
      setContinueState();
      target.classList.add('typing');
      let i = 0;
      const timer = setInterval(() => {
        target.textContent = text.slice(0, i + 1);
        i++;
        document.getElementById('storyScroll').scrollTop = document.getElementById('storyScroll').scrollHeight;
        if (i >= text.length) {
          clearInterval(timer);
          target.classList.remove('typing');
          isTyping = false;
          setContinueState();
        }
      }, 24);
    }

    function setContinueState() {
      const btn = document.getElementById('continueBtn');
      btn.disabled = isTyping || choiceMode;
      btn.textContent = isTyping ? '命线书写中' : choiceMode ? '等待抉择' : '拨动命线';
    }

    function continueLife() {
      if (isTyping || choiceMode) return;

      document.getElementById('thinking').classList.add('show');
      document.getElementById('continueBtn').disabled = true;
      document.getElementById('storyState').textContent = 'AI 正在演算';

      setTimeout(() => {
        document.getElementById('thinking').classList.remove('show');
        document.getElementById('storyState').textContent = '命运正在展开';

        const text = fragments[fragmentIndex % fragments.length];
        fragmentIndex++;
        nodeIndex++;
        document.getElementById('nodeCode').textContent = 'FRAGMENT ' + String(nodeIndex).padStart(3, '0');
        appendEntry(text);

        const shouldChoice = fragmentIndex === 4 || fragmentIndex === 8 || fragmentIndex === 13 || Math.random() < 0.22;
        if (shouldChoice) {
          setTimeout(triggerChoice, 700);
        }
      }, 520);
    }

    function triggerChoice() {
      if (isTyping) {
        setTimeout(triggerChoice, 400);
        return;
      }

      const set = choiceSets[Math.floor(Math.random() * choiceSets.length)];
      document.getElementById('choiceA').textContent = set.a;
      document.getElementById('choiceB').textContent = set.b;
      document.getElementById('choiceC').textContent = set.c;
      document.getElementById('choiceBox').dataset.choiceSet = JSON.stringify(set.result);
      document.getElementById('choiceBox').classList.add('show');
      document.getElementById('storyState').textContent = '命运出现分歧';
      choiceMode = true;
      setContinueState();
      appendEntry('你必须做出选择。', 'system');
    }

    function choosePath(key) {
      if (!choiceMode || isTyping) return;
      const result = JSON.parse(document.getElementById('choiceBox').dataset.choiceSet || '{}');
      const lines = result[key] || ['你做出了选择。'];
      document.getElementById('choiceBox').classList.remove('show');
      choiceMode = false;
      document.getElementById('storyState').textContent = '命运正在展开';
      setContinueState();

      const choiceText = document.getElementById('choice' + key).textContent;
      appendEntry(choiceText, 'choice-made');

      setTimeout(() => {
        appendEntry(lines.join(''));
        applyChoiceEffect(key);
      }, 650);
    }

    function applyChoiceEffect(key) {
      if (key === 'A') changeStat('mind', 1, 'attrMind');
      if (key === 'B') changeStat('bond', 1, 'attrBond');
      if (key === 'C') changeStat('fate', 1, 'attrFate');
    }

    function changeStat(key, delta, elId) {
      stats[key] += delta;
      const el = document.getElementById(elId);
      el.querySelector('b').textContent = String(stats[key]).padStart(2, '0');
      el.querySelector('em').textContent = '+' + delta;
      el.classList.add('bump');
      setTimeout(() => el.classList.remove('bump'), 1200);
      toast('属性发生变化');
    }
  </script>
</body>
</html>
